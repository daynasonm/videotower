<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" fill="transparent"/>
  <circle cx="32" cy="32" r="19" fill="#39ff14" opacity="0.34" filter="url(#glow)">
    <animate attributeName="opacity" values="0.2;0.82;0.2" dur="1.3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="16;23;16" dur="1.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="32" r="11" fill="#39ff14" opacity="0.92">
    <animate attributeName="opacity" values="0.48;1;0.48" dur="1.3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="9;13;9" dur="1.3s" repeatCount="indefinite"/>
  </circle>
</svg>
