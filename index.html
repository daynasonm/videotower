<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Tower</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="scene"></canvas>
  <video id="webcam" autoplay playsinline muted></video>
  <div id="hint">move your head</div>

  <div id="overlay">
    <button id="start">Enter</button>
  </div>

  <div id="status"></div>

  <div id="loader">
    <div id="loader-title">NASA Archive</div>
    <div id="loader-log"></div>
  </div>

  <div id="fatal"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
