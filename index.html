<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Tower</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="scene"></canvas>
  <video id="webcam" autoplay playsinline muted></video>

  <div id="top-hud">
    <div id="tracking-status" class="hud-chip"></div>
    <div id="hand-status" class="hud-chip"></div>
  </div>

  <div id="bottom-right-hud">
    <div id="source-status" class="hud-chip"></div>
    <div id="assets-status" class="hud-chip"></div>
  </div>

  <a id="about-link" class="hud-chip" href="about.html">about</a>

  <div id="bottom-hud">
    <div id="hint" class="hud-chip">move your head</div>
    <div id="pattern-label" class="hud-chip">open hand</div>
  </div>

  <div id="overlay">
    <button id="start">Enter</button>
  </div>

  <div id="loader">
    <div id="loader-title">Video Archive</div>
    <div id="loader-log"></div>
  </div>

  <div id="fatal"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
